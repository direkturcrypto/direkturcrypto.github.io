<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="200" cy="150" r="120" fill="#00e5ff" opacity=".06"/>
  <circle cx="1000" cy="480" r="150" fill="#a855f7" opacity=".06"/>
  <circle cx="600" cy="315" r="200" fill="#ec4899" opacity=".03"/>
  <!-- Border accent -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="url(#accent)" stroke-width="3" rx="0"/>
  <!-- Name -->
  <text x="600" y="260" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="72" fill="url(#accent)">direkturcrypto</text>
  <!-- Tagline -->
  <text x="600" y="330" text-anchor="middle" font-family="Arial,sans-serif" font-weight="600" font-size="28" fill="#94a3b8">Bug Hunter &amp; Web3 Developer</text>
  <!-- Skills row -->
  <text x="600" y="400" text-anchor="middle" font-family="Arial,sans-serif" font-weight="500" font-size="20" fill="#94a3b8" opacity=".7">DeFi · Automation · AI Content · Smart Contracts</text>
  <!-- Available badge -->
  <rect x="440" y="440" width="320" height="44" rx="22" fill="#00e5ff" opacity=".1" stroke="#00e5ff" stroke-width="1" stroke-opacity=".3"/>
  <circle cx="470" cy="462" r="6" fill="#00e5ff"/>
  <text x="600" y="469" text-anchor="middle" font-family="Arial,sans-serif" font-weight="600" font-size="18" fill="#00e5ff">Available for Hire</text>
</svg>
